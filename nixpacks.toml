[providers]
  php = "8.2"

[phases.setup]
  nixPkgs = ["php82", "php82Extensions.gd", "php82Extensions.zip", "php82Extensions.bcmath", "php82Extensions.intl", "php82Packages.composer", "nodejs"]

[phases.install]
  cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install",
    "npm run prod"
  ]

[phases.build]
  cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
  ]

[start]
  cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
